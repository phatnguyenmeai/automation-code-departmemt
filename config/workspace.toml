[workspace]
id = "dev-department-default"

# Model choices per role. Allowed: opus | sonnet | haiku
[models]
pm = "opus"
ba = "opus"
dev = "sonnet"
frontend = "sonnet"
test_strategy = "opus"
test_exec = "sonnet"

[test]
# Base URL used for integration tests and relative navigate() paths.
base_url = "http://localhost:3000"
# Set to false to skip UI scenarios entirely (useful in CI w/o a browser).
enable_playwright = true

# Memory management configuration (OpenClaw-style).
# When enabled, agents receive prior conversation context via memory recall.
[memory]
enabled = true
# Token threshold before triggering compaction (summarization of older messages).
compact_threshold = 6000

# Per-agent memory budgets. Each agent can have different context window allocations.
[memory.budgets.ba]
total_context_tokens = 8000
system_prompt_reserve = 500
current_task_reserve = 3000
history_budget = 4500

[memory.budgets.dev]
total_context_tokens = 8000
system_prompt_reserve = 500
current_task_reserve = 4000
history_budget = 3500

[memory.budgets.frontend]
total_context_tokens = 8000
system_prompt_reserve = 500
current_task_reserve = 4000
history_budget = 3500

[memory.budgets.test_strategy]
total_context_tokens = 12000
system_prompt_reserve = 500
current_task_reserve = 5000
history_budget = 6500

[memory.budgets.test_exec]
total_context_tokens = 4000
system_prompt_reserve = 300
current_task_reserve = 2000
history_budget = 1700

# Skills configuration — each skill is a directory under skills/ with a SKILL.md manifest.
[skills]
# Directory containing skill definitions.
dir = "skills"
# Skills loaded at startup (all skills in the dir are loaded by default).
# Uncomment to restrict to specific skills:
# enabled = ["rust-backend", "mongodb", "vuejs-frontend", "pm-sprint-planner", "ba-requirements", "playwright-e2e", "code-reviewer", "api-tester"]

# Plugin tools registered at startup.
[plugins]
# Built-in tools are always registered. Additional tool plugins can be added here.
builtin = ["shell", "file_read", "file_write", "http_request", "cargo_tool", "mongo_tool", "playwright_runner"]

# Telegram bot integration.
# Enables agent reporting, approval workflows, and interactive messaging via Telegram.
# To enable: set bot_token from @BotFather and default_chat_id for your group/user.
# Bot token can also be provided via TELEGRAM_BOT_TOKEN env var or --telegram-token CLI arg.
#
# [telegram]
# bot_token = "123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11"
# default_chat_id = -1001234567890
# allowed_users = []              # Empty = allow all; or list specific user IDs
# webhook_mode = false            # false = long-polling (recommended for dev)
# webhook_url = ""                # Required if webhook_mode = true
# parse_mode = "HTML"             # HTML or MarkdownV2

# MongoDB connection settings (used by mongo_tool).
[mongodb]
connection_string = "mongodb://localhost:27017"
default_database = "dev_department"

# Rust backend settings (used by cargo_tool).
[rust]
workspace_root = "."
default_toolchain = "stable"
